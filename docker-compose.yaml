services:
  php-server:
    image: php:8.2-apache
    ports:
      - "8080:80"
    volumes:
      - ./:/var/www/html/renew
      - ./docker/apache.conf:/etc/apache2/conf-enabled/custom.conf
    environment:
      SMTP_HOST: mailpit
      SMTP_PORT: 1025
    depends_on:
      - mailpit
    command: bash -c "a2enmod rewrite && apache2-foreground"

  mailpit:
    image: axllent/mailpit
    ports:
      - "8026:8025"